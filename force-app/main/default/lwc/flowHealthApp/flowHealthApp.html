                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
                                <lightning-combobox
                                    label="Severity"
                                    field-level-help="How serious this violation is. Critical = major issue (highest score deduction), Low = minor suggestion (smallest deduction)."
                                    value={editingRule.severity}
                                    data-field="severity"
                                    options={severityOptions}
                                    onchange={handleCustomRuleFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-m-bottom_small">
                                <lightning-input
                                    type="number"
                                    label="Weight (1-20)"
                                    field-level-help="How many points each finding deducts from the health score (out of 100). Higher weight = bigger impact. Typical: 3 (low), 5 (medium), 8 (high), 10 (critical)."
                                    value={editingRule.weight}
                                    data-field="weight"
                                    onchange={handleCustomRuleFieldChange}
                                    min="1" max="20"
                                ></lightning-input>
                            </div>

                            <!-- Description and Remediation -->
                            <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                                <lightning-textarea
                                    label="Description (shown when rule triggers)"
                                    field-level-help="Appears in the findings list when this rule detects an issue. Explain what the rule checks and why it matters for flow quality."
                                    value={editingRule.description}
                                    data-field="description"
                                    onchange={handleCustomRuleFieldChange}
                                    placeholder="Explain what this rule checks and why it matters..."
                                ></lightning-textarea>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                                <lightning-textarea
                                    label="Remediation (how to fix)"
                                    field-level-help="Guidance shown alongside the finding to help the admin resolve the issue. Be specific about what changes to make."
                                    value={editingRule.remediation}
                                    data-field="remediation"
                                    onchange={handleCustomRuleFieldChange}
                                    placeholder="Explain how the admin should fix this finding..."
                                ></lightning-textarea>
                            </div>

                            <!-- ======================================= -->
                            <!-- TEST RULE: Real-time validation         -->
                            <!-- ======================================= -->
                            <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                                <div class="slds-box slds-box_x-small slds-theme_shade">
                                    <p class="slds-text-title_bold slds-m-bottom_x-small">
                                        <lightning-icon icon-name="utility:preview" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                        Test Rule Against a Flow
                                    </p>
                                    <div class="slds-grid slds-grid_vertical-align-end slds-gutters_small">
                                        <div class="slds-col slds-grow">
                                            <lightning-combobox
                                                label="Select a Flow to Test"
                                                placeholder="Choose a flow..."
                                                options={testFlowOptions}
                                                value={testRuleFlowName}
                                                onchange={handleTestFlowChange}
                                                field-level-help="Pick any active flow in your org. The rule will be evaluated against this flow without saving."
                                            ></lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-no-flex">
                                            <lightning-button
                                                variant="neutral"
                                                label="Test Rule"
                                                icon-name="utility:play"
                                                onclick={handleTestRule}
                                                disabled={testRuleButtonDisabled}
                                            ></lightning-button>
                                        </div>
                                    </div>

                                    <!-- Test loading -->
                                    <template lwc:if={testRuleLoading}>
                                        <div class="slds-grid slds-grid_vertical-align-center slds-m-top_small">
                                            <lightning-spinner alternative-text="Testing rule..." size="small" class="slds-m-right_small"></lightning-spinner>
                                            <span class="slds-text-body_small slds-text-color_weak">Running rule against flow...</span>
                                        </div>
                                    </template>

                                    <!-- Test results -->
                                    <template lwc:if={hasTestResult}>
                                        <div class={testResultBannerClass}>
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <lightning-icon icon-name={testResultIconName} size="x-small" variant={testResultVariant} class="slds-m-right_x-small"></lightning-icon>
                                                <span class="slds-text-body_regular"><strong>{testResultMessage}</strong></span>
                                            </div>
                                            <template lwc:if={hasTestFindings}>
                                                <div class="slds-m-top_x-small">
                                                    <template for:each={testRuleResult.findings} for:item="finding">
                                                        <div key={finding.key} class="slds-p-vertical_xx-small slds-border_bottom">
                                                            <span class={finding.severityBadgeClass}>{finding.severity}</span>
                                                            <template lwc:if={finding.hasElement}>
                                                                <span class="slds-m-left_x-small slds-text-body_small">
                                                                    <strong>{finding.elementName}</strong> ({finding.elementType})
                                                                </span>
                                                            </template>
                                                            <p class="slds-text-body_small slds-m-top_xx-small">{finding.description}</p>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCloseCustomRuleModal}></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Save Rule"
                            onclick={handleSaveCustomRule}
                            class="slds-m-left_x-small"
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>

    <!-- ================================================================ -->
    <!-- PERMSET PATCHMASTER VIEW (Sprint 7)                              -->
    <!-- ================================================================ -->
    <template lwc:if={isPermsetView}>
        <div class="bulk-card-container slds-m-bottom_medium">
            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_medium">
                <div class="slds-col">
                    <h2 class="slds-text-heading_medium">
                        <lightning-icon icon-name="utility:merge" size="small" class="slds-m-right_x-small"></lightning-icon>
                        PermSet Patchmaster
                    </h2>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                        Surgical merge for Permission Sets. Paste your Destination (Prod) and Source (Dev) XML — we'll generate a safe patch that adds new permissions without destroying existing ones.
                    </p>
                </div>
            </div>

            <!-- Dual XML Input Area -->
            <div class="patchmaster-dual-input slds-grid slds-gutters_medium slds-m-bottom_medium slds-wrap">
                <!-- Input A: Source / Delta (LEFT) -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="patchmaster-input-panel patchmaster-src-panel">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">
                                <span class="patchmaster-label-badge patchmaster-label-src">A</span>
                                <strong>Source / Delta</strong>
                                <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">— New changes from Dev Org</span>
                            </label>
                            <div class="slds-form-element__control">
                                <textarea
                                    class="slds-textarea permset-xml-textarea"
                                    placeholder="Paste the Dev / Source Org&#10;.permissionset-meta.xml here..."
                                    value={patchSrcXml}
                                    oninput={handlePatchSrcChange}
                                    rows="14"
                                ></textarea>
                            </div>
                        </div>
                        <div class="slds-m-top_x-small">
                            <label class="slds-button slds-button_neutral slds-button_small">
                                <lightning-icon icon-name="utility:upload" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                Upload Source XML
                                <input type="file" accept=".xml,.permissionset-meta.xml" data-input="src" onchange={handlePatchFileUpload} class="slds-hide" />
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Input B: Destination / Base (RIGHT) -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="patchmaster-input-panel patchmaster-dest-panel">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">
                                <span class="patchmaster-label-badge patchmaster-label-dest">B</span>
                                <strong>Destination / Base</strong>
                                <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">— The "truth" from Production</span>
                            </label>
                            <div class="slds-form-element__control">
                                <textarea
                                    class="slds-textarea permset-xml-textarea"
                                    placeholder="Paste the Production / Target Org&#10;.permissionset-meta.xml here..."
                                    value={patchDestXml}
                                    oninput={handlePatchDestChange}
                                    rows="14"
                                ></textarea>
                            </div>
                        </div>
                        <div class="slds-m-top_x-small">
                            <label class="slds-button slds-button_neutral slds-button_small">
                                <lightning-icon icon-name="utility:upload" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                Upload Destination XML
                                <input type="file" accept=".xml,.permissionset-meta.xml" data-input="dest" onchange={handlePatchFileUpload} class="slds-hide" />
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="slds-grid slds-grid_align-center slds-m-bottom_medium" style="gap: 0.75rem;">
                <button class="slds-button slds-button_neutral action-btn-industrial" onclick={handleValidateDependencies} disabled={patchValidateDisabled}>
                    <lightning-icon icon-name="utility:check" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                    Validate Dependencies
                </button>
                <button class="slds-button slds-button_brand action-btn-industrial" onclick={handleGeneratePatch} disabled={patchGenerateDisabled}>
                    <lightning-icon icon-name="utility:merge" size="xx-small" class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                    Generate Patch
                </button>
                <button class="slds-button slds-button_neutral action-btn-industrial" onclick={handlePatchReset}>
                    <lightning-icon icon-name="utility:refresh" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                    Reset &amp; New Scan
                </button>
            </div>

            <!-- ============================================================ -->
            <!-- SPRINT 8: VALIDATION RESULTS                                  -->
            <!-- ============================================================ -->

            <!-- Validation Loading -->
            <template lwc:if={validationLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Validating dependencies..." size="medium"></lightning-spinner>
                    <span class="slds-m-left_medium slds-text-color_weak">Scanning for missing dependencies...</span>
                </div>
            </template>

            <!-- Validation Error -->
            <template lwc:if={hasValidationError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                    <h2>{validationError}</h2>
                </div>
            </template>

            <!-- Validation Results -->
            <template lwc:if={hasValidationResult}>
                <div class="slds-m-bottom_medium">
                    <!-- Safe to Deploy — Green Banner -->
                    <template lwc:if={validationResult.isSafeToDeploy}>
                        <div class="slds-box slds-theme_success slds-m-bottom_medium" style="border-radius: 8px; padding: 1.25rem; background: linear-gradient(135deg, #04844b 0%, #2e844a 100%); color: #fff;">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon icon-name="utility:success" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                                <div>
                                    <p style="font-size: 1.1rem; font-weight: 700;">All Clear — Safe to Deploy</p>
                                    <p style="font-size: 0.85rem; opacity: 0.9;">{validationResult.summaryMessage}</p>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Missing Dependencies Found — Red/Warning Panel -->
                    <template lwc:if={validationResult.hasGroups}>
                        <div class="slds-box slds-m-bottom_medium" style="border-radius: 8px; border: 2px solid #c23934; background: #fef1f1;">
                            <!-- Header -->
                            <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_small slds-border_bottom" style="border-color: #f4c3c1;">
                                <lightning-icon icon-name="utility:warning" size="small" style="fill: #c23934;" class="slds-m-right_small"></lightning-icon>
                                <div>
                                    <p style="font-size: 1.1rem; font-weight: 700; color: #c23934;">Missing Dependencies Detected</p>
                                    <p class="slds-text-body_small" style="color: #8e3a34;">{validationResult.summaryMessage}</p>
                                </div>
                                <div class="slds-col_bump-left">
                                    <span class="slds-badge" style="background: #c23934; color: #fff; font-size: 1rem; padding: 0.25rem 0.75rem;">
                                        {validationResult.totalMissingCount}
                                    </span>
                                </div>
                            </div>

                            <!-- Dependency Groups -->
                            <div class="slds-p-top_small">
                                <template for:each={validationResult.groups} for:item="group">
                                    <div key={group.key} class="slds-m-bottom_small">
                                        <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_xx-small">
                                            <lightning-icon icon-name={group.icon} size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                                            <span style="font-weight: 600; color: #333;">{group.label}</span>
                                            <span class="slds-badge slds-m-left_x-small" style="background: #e8e8e8; color: #444;">{group.count}</span>
                                        </div>
                                        <div class="slds-p-left_medium">
                                            <template for:each={group.items} for:item="item">
                                                <div key={item.key} class="slds-grid slds-grid_vertical-align-center slds-p-vertical_xx-small" style="border-bottom: 1px solid #f0e0e0;">
                                                    <lightning-icon icon-name="utility:close" size="xx-small" class="slds-m-right_xx-small" style="fill: #c23934;"></lightning-icon>
                                                    <span class="slds-text-body_small" style="font-family: 'SF Mono', 'Consolas', monospace; color: #c23934;">
                                                        {item.displayName}
                                                    </span>
                                                    <span class="slds-text-body_small slds-text-color_weak slds-m-left_x-small">
                                                        ({item.xmlContext})
                                                    </span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Guidance Footer -->
                            <div class="slds-p-top_small slds-border_top" style="border-color: #f4c3c1;">
                                <p class="slds-text-body_small" style="color: #8e3a34;">
                                    <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                    <strong>Next steps:</strong> Deploy the missing metadata to the Destination Org, update the Destination XML, and re-validate.
                                </p>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ============================================================ -->
            <!-- PATCH RESULTS (existing)                                      -->
            <!-- ============================================================ -->

            <!-- Success Toast -->
            <template lwc:if={patchSuccessVisible}>
                <div class="patch-success-toast slds-m-bottom_medium">
                    <lightning-icon icon-name="utility:success" size="x-small" variant="inverse"></lightning-icon>
                    Patch generated successfully — {patchResult.summaryLabel}
                </div>
            </template>

            <!-- Loading Spinner -->
            <template lwc:if={patchLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Generating patch..." size="medium"></lightning-spinner>
                    <span class="slds-m-left_medium slds-text-color_weak">Reconciling permission sets...</span>
                </div>
            </template>

            <!-- Error -->
            <template lwc:if={hasPatchError}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                    <h2>{patchError}</h2>
                </div>
            </template>

            <!-- Patch Results -->
            <template lwc:if={hasPatchResult}>
                <div class="slds-m-bottom_medium">
                    <!-- Merge Summary Hero -->
                    <div class="patchmaster-hero slds-m-bottom_medium">
                        <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-wrap" style="gap: 2rem;">
                            <div class="slds-text-align_center">
                                <p class="slds-text-title_caps slds-m-bottom_xx-small">Source</p>
                                <p style="font-size: 2rem; font-weight: 700; color: #e87400;">
                                    {patchResult.sourcePermCount}
                                </p>
                                <p class="slds-text-body_small slds-text-color_weak">permissions</p>
                            </div>
                            <div class="slds-text-align_center">
                                <lightning-icon icon-name="utility:add" size="small" style="color: #04844B;"></lightning-icon>
                            </div>
                            <div class="slds-text-align_center">
                                <p class="slds-text-title_caps slds-m-bottom_xx-small">Destination</p>
                                <p style="font-size: 2rem; font-weight: 700; color: #0176d3;">
                                    {patchResult.destinationPermCount}
                                </p>
                                <p class="slds-text-body_small slds-text-color_weak">permissions</p>
                            </div>
                            <div class="slds-text-align_center">
                                <lightning-icon icon-name="utility:forward" size="large"></lightning-icon>
                            </div>
                            <div class="slds-text-align_center">
                                <p class="slds-text-title_caps slds-m-bottom_xx-small">Patched</p>
                                <p style="font-size: 2rem; font-weight: 700; color: #04844B;">
                                    {patchResult.patchedPermCount}
                                </p>
                                <p class="slds-text-body_small slds-text-color_weak">permissions</p>
                            </div>
                        </div>
                        <div class="slds-text-align_center slds-m-top_small">
                            <span class="slds-badge slds-badge_success" style="font-size: 0.85rem; padding: 0.3rem 1rem;">
                                {patchResult.summaryLabel}
                            </span>
                        </div>
                    </div>

                    <!-- Actions Applied -->
                    <template lwc:if={patchResult.hasActions}>
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">
                            <lightning-icon icon-name="utility:checkin" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            Patch Actions ({patchResult.enrichedActions.length})
                        </h3>

                        <div class="slds-m-bottom_medium">
                            <template for:each={patchResult.enrichedActions} for:item="action">
                                <div key={action.key} class="permset-action-row slds-p-vertical_x-small slds-border_bottom">
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <lightning-icon icon-name={action.actionIcon} size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                                        <span class={action.actionBadgeClass}>{action.actionType}</span>
                                        <span class="slds-m-left_x-small"><strong>{action.itemName}</strong></span>
                                        <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">({action.itemType})</span>
                                    </div>
                                    <p class="slds-text-body_small slds-m-left_large slds-m-top_xx-small slds-text-color_weak">{action.detail}</p>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- No changes needed -->
                    <template lwc:if={patchResult.noActions}>
                        <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
                            <lightning-icon icon-name="utility:check" size="large" variant="success"></lightning-icon>
                            <p class="slds-text-heading_small slds-m-top_small">Already in Sync!</p>
                            <p class="slds-text-body_small slds-text-color_weak">Source permissions are already present in the Destination. No patch needed.</p>
                        </div>
                    </template>

                    <!-- Download / Copy Patched XML -->
                    <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">
                            <lightning-icon icon-name="utility:download" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            Patched XML Output
                        </h3>
                        <div class="slds-grid slds-grid_align-center" style="gap: 0.75rem;">
                            <button class="slds-button slds-button_brand action-btn-industrial" onclick={handleDownloadPatchedXml}>
                                <lightning-icon icon-name="utility:download" size="xx-small" class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                                Download Patched XML
                            </button>
                            <button class="slds-button slds-button_neutral action-btn-industrial" onclick={handleCopyPatchedXml}>
                                <lightning-icon icon-name="utility:copy" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                                Copy to Clipboard
                            </button>
                        </div>

                        <!-- Preview Toggle -->
                        <div class="slds-m-top_small">
                            <a href="javascript:void(0);" onclick={handleTogglePatchedXmlPreview} class="slds-text-body_small" style="color: #0176d3; cursor: pointer; text-decoration: none;">
                                <lightning-icon icon-name={patchedXmlPreviewIcon} size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                {patchedXmlPreviewLabel}
                            </a>
                            <template lwc:if={showPatchedXmlPreview}>
                                <pre class="permset-xml-preview slds-m-top_x-small" style="max-height: 400px; overflow: auto; background: #1e1e1e; color: #d4d4d4; padding: 0.75rem; border-radius: 4px; font-size: 0.75rem; font-family: 'SF Mono', 'Consolas', 'Monaco', monospace; white-space: pre; margin: 0;">{patchedXmlValue}</pre>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- ================================================================ -->
    <!-- COMPARE VERSIONS MODAL (Sprint 6)                                -->
    <!-- ================================================================ -->
    <template lwc:if={showCompareModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        variant="bare-inverse"
                        size="large"
                        class="slds-modal__close"
                        onclick={handleCloseCompare}>
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium slds-hyphenate">
                        <lightning-icon icon-name="utility:change_record_type" size="small" class="slds-m-right_x-small"></lightning-icon>
                        Compare Versions — {compareFlowName}
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">

                    <!-- Version Selectors -->
                    <template lwc:if={compareLoadingVersions}>
                        <div class="slds-align_absolute-center slds-p-around_large">
                            <lightning-spinner alternative-text="Loading versions..." size="medium"></lightning-spinner>
                            <span class="slds-m-left_medium slds-text-color_weak">Loading flow versions...</span>
                        </div>
                    </template>

                    <template lwc:if={compareError}>
                        <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                            <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                            <h2>{compareError}</h2>
                        </div>
                    </template>

                    <template lwc:elseif={compareVersionsLoaded}>
                        <div class="slds-grid slds-gutters_small slds-m-bottom_medium">
                            <div class="slds-col slds-size_5-of-12">
                                <lightning-combobox
                                    label="Old Version (Baseline)"
                                    placeholder="Select version..."
                                    options={compareVersionOptions}
                                    value={compareOldVersionId}
                                    onchange={handleOldVersionChange}
                                ></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_2-of-12 slds-text-align_center slds-p-top_large">
                                <lightning-icon icon-name="utility:forward" size="small"></lightning-icon>
                            </div>
                            <div class="slds-col slds-size_5-of-12">
                                <lightning-combobox
                                    label="New Version (Current)"
                                    placeholder="Select version..."
                                    options={compareVersionOptions}
                                    value={compareNewVersionId}
                                    onchange={handleNewVersionChange}
                                ></lightning-combobox>
                            </div>
                        </div>

                        <div class="slds-text-align_center slds-m-bottom_medium">
                            <button class="slds-button slds-button_brand action-btn-compare" onclick={handleRunCompare} disabled={compareButtonDisabled}>
                                <lightning-icon icon-name="utility:diff" size="xx-small" class="slds-m-right_xx-small" variant="inverse"></lightning-icon>
                                Compare Versions
                            </button>
                        </div>

                        <!-- Loading compare spinner -->
                        <template lwc:if={compareLoading}>
                            <div class="slds-align_absolute-center slds-p-around_large">
                                <lightning-spinner alternative-text="Comparing versions..." size="medium"></lightning-spinner>
                                <span class="slds-m-left_medium slds-text-color_weak">Analyzing both versions and computing diff...</span>
                            </div>
                        </template>

                        <!-- Diff Results -->
                        <template lwc:if={hasCompareDiffResult}>

                            <!-- Score Delta Hero -->
                            <div class="compare-score-hero slds-m-bottom_medium">
                                <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-wrap">
                                    <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                        <p class="slds-text-title_caps slds-m-bottom_xx-small">Old Version</p>
                                        <p class="compare-score" style={compareDiffResult.oldScoreStyleAttr}>
                                            {compareDiffResult.oldScore}
                                        </p>
                                        <span class="slds-badge">{compareDiffResult.oldGrade}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                        <p class="slds-text-title_caps slds-m-bottom_xx-small">Score Change</p>
                                        <p class={compareDiffResult.scoreDeltaClass} style="font-size: 2rem; font-weight: 700;">
                                            {compareDiffResult.scoreDeltaDisplay}
                                        </p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                        <p class="slds-text-title_caps slds-m-bottom_xx-small">New Version</p>
                                        <p class="compare-score" style={compareDiffResult.newScoreStyleAttr}>
                                            {compareDiffResult.newScore}
                                        </p>
                                        <span class="slds-badge">{compareDiffResult.newGrade}</span>
                                    </div>
                                </div>

                                <!-- Regression / Improvement banners -->
                                <template lwc:if={compareHasRegression}>
                                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-top_small" role="alert">
                                        <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        <span>{compareDiffResult.regressionWarning}</span>
                                    </div>
                                </template>
                                <template lwc:if={compareHasImprovement}>
                                    <div class="slds-box slds-theme_success slds-m-top_small">
                                        <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="slds-m-right_x-small"></lightning-icon>
                                        <span>{compareDiffResult.improvementNote}</span>
                                    </div>
                                </template>
                            </div>

                            <!-- Change Summary -->
                            <div class="slds-grid slds-gutters_small slds-m-bottom_medium">
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="slds-box slds-box_x-small slds-text-align_center">
                                        <p class="slds-text-heading_medium">{compareDiffResult.totalChanges}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">Total Changes</p>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="slds-box slds-box_x-small slds-text-align_center">
                                        <p class="slds-text-heading_medium slds-text-color_success">{compareDiffResult.summary.added}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">Added</p>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="slds-box slds-box_x-small slds-text-align_center">
                                        <p class="slds-text-heading_medium slds-text-color_error">{compareDiffResult.summary.removed}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">Removed</p>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="slds-box slds-box_x-small slds-text-align_center">
                                        <p class="slds-text-heading_medium" style="color: #DD7A01;">{compareDiffResult.summary.modified}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">Modified</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Semantic Meaning Summary -->
                            <template lwc:if={compareDiffResult.hasChanges}>
                                <div class="semantic-summary-bar slds-m-bottom_small">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <div class="slds-col">
                                            <span class="slds-badge semantic-badge-functional slds-m-right_xx-small">
                                                <lightning-icon icon-name="utility:toggle_on" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                {compareDiffResult.functionalChanges} Functional
                                            </span>
                                            <span class="slds-badge semantic-badge-cosmetic">
                                                <lightning-icon icon-name="utility:layout" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                {compareDiffResult.cosmeticChanges} Cosmetic
                                            </span>
                                        </div>
                                        <div class="slds-col slds-no-flex">
                                            <template lwc:if={hasCosmeticChangesInResult}>
                                                <lightning-input
                                                    type="toggle"
                                                    label="Hide Cosmetic Changes"
                                                    variant="label-hidden"
                                                    message-toggle-active="Functional only"
                                                    message-toggle-inactive="Showing all"
                                                    checked={hideCosmeticChanges}
                                                    onchange={handleToggleHideCosmetic}
                                                    class="cosmetic-toggle">
                                                </lightning-input>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <!-- No changes -->
                            <template lwc:if={compareDiffResult.noChanges}>
                                <div class="slds-illustration slds-illustration_small slds-p-around_medium slds-text-align_center">
                                    <lightning-icon icon-name="utility:check" size="large" variant="success"></lightning-icon>
                                    <p class="slds-text-heading_small slds-m-top_small">No Differences Found</p>
                                    <p class="slds-text-body_small slds-text-color_weak">These two versions are identical in structure and configuration.</p>
                                </div>
                            </template>

                            <!-- Changes grouped by category (filtered by semantic toggle) -->
                            <template lwc:if={hasDisplayedChanges}>
                                <template for:each={displayedGroupedChanges} for:item="group">
                                    <div key={group.key} class="slds-m-bottom_medium">
                                        <h3 class="slds-text-heading_small slds-m-bottom_x-small slds-border_bottom slds-p-bottom_x-small">
                                            {group.category}
                                        </h3>
                                        <template for:each={group.changes} for:item="change">
                                            <div key={change.key} class={change.changeRowClass}>
                                                <div class="slds-grid slds-grid_vertical-align-center">
                                                    <span class={change.changeTypeBadgeClass}>{change.changeType}</span>
                                                    <span class={change.semanticBadgeClass} style="margin-left: 4px; font-size: 0.65rem;">
                                                        {change.semanticLabel}
                                                    </span>
                                                    <span class="slds-m-left_x-small slds-text-body_regular">
                                                        <strong>{change.itemLabel}</strong>
                                                        <template lwc:if={change.itemType}>
                                                            <span class="slds-text-body_small slds-text-color_weak slds-m-left_xx-small">({change.itemType})</span>
                                                        </template>
                                                    </span>
                                                    <span class="slds-col_bump-left">
                                                        <span class={change.riskBadgeClass}>{change.riskLevel}</span>
                                                    </span>
                                                </div>
                                                <p class="slds-text-body_small slds-m-top_xx-small slds-m-left_medium">{change.description}</p>
                                                <template lwc:if={change.hasValues}>
                                                    <div class="slds-m-left_medium slds-m-top_xx-small slds-text-body_small">
                                                        <span class="slds-text-color_error">&minus; {change.oldValue}</span>
                                                        <span class="slds-m-horizontal_xx-small">&rarr;</span>
                                                        <span class="slds-text-color_success">+ {change.newValue}</span>
                                                    </div>
                                                </template>
                                                <template lwc:if={change.riskReason}>
                                                    <p class="slds-text-body_small slds-text-color_weak slds-m-left_medium slds-m-top_xx-small">
                                                        {change.riskReason}
                                                    </p>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>

                            <!-- All changes hidden by filter -->
                            <template lwc:if={noDisplayedChanges}>
                                <div class="slds-illustration slds-illustration_small slds-p-around_medium slds-text-align_center">
                                    <lightning-icon icon-name="utility:filterList" size="large"></lightning-icon>
                                    <p class="slds-text-heading_small slds-m-top_small">All Changes Are Cosmetic</p>
                                    <p class="slds-text-body_small slds-text-color_weak">
                                        No functional logic changes detected between these versions.
                                        Toggle off "Hide Cosmetic Changes" to see layout-only differences.
                                    </p>
                                </div>
                            </template>
                        </template>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleCloseCompare}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ================================================================ -->
    <!-- LOGIC AUDIT VIEW (Sprint 8 — Sanity Engine)                      -->
    <!-- ================================================================ -->
    <template lwc:if={isAuditView}>
        <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
            <div class="slds-card__header">
                <h2 class="slds-text-heading_medium">
                    <lightning-icon icon-name="utility:target" size="small" class="slds-m-right_x-small"></lightning-icon>
                    Logic Audit — Deterministic Flow Analysis
                </h2>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                    Pick a flow from this org, or paste/upload a Flow XML (.flow-meta.xml) — analysis runs locally either way: deterministic Logic Hash, no AI.
                </p>
            </div>

            <!-- Input mode selector -->
            <div class="slds-m-top_medium">
                <lightning-radio-group
                    name="auditInputMode"
                    label="Flow source"
                    options={auditModeOptions}
                    value={auditInputMode}
                    onchange={handleAuditModeChange}
                    type="radio"
                ></lightning-radio-group>
            </div>

            <!-- MODE A: Select a flow from this org -->
            <template lwc:if={isAuditOrgMode}>
                <div class="slds-m-top_medium">
                    <div class="slds-grid slds-grid_vertical-align-end slds-wrap slds-gutters_x-small">
                        <div class="slds-col slds-size_2-of-3">
                            <lightning-combobox
                                variant="label-hidden"
                                placeholder="Select a flow..."
                                options={auditFlowOptions}
                                value={auditSelectedFlow}
                                onchange={handleAuditFlowSelect}
                                disabled={auditLoadingFromOrg}
                            ></lightning-combobox>
                        </div>
                        <div class="slds-col">
                            <lightning-button
                                variant="brand"
                                label="Audit"
                                icon-name="utility:play"
                                onclick={handleAuditLoadFromOrg}
                                disabled={auditLoadFromOrgDisabled}
                            ></lightning-button>
                        </div>
                        <template lwc:if={auditLoadingFromOrg}>
                            <div class="slds-col slds-grid slds-grid_vertical-align-center">
                                <lightning-spinner alternative-text="Loading flow..." size="small"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- MODE B: Paste / upload XML -->
            <template lwc:if={isAuditXmlMode}>
                <div class="slds-m-top_medium">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label slds-text-title_bold" for="audit-xml-input">
                            Flow XML
                        </label>
                        <div class="slds-form-element__control">
                            <textarea
                                class="slds-textarea audit-xml-textarea"
                                placeholder="Paste your .flow-meta.xml content here..."
                                rows="8"
                                oninput={handleAuditXmlChange}></textarea>
                        </div>
                    </div>

                    <!-- File Upload -->
                    <div class="slds-m-top_small slds-grid slds-grid_vertical-align-center slds-wrap">
                        <div class="slds-col slds-m-right_medium">
                            <input type="file" accept=".xml,.flow-meta.xml,.flow" class="slds-hide" data-id="auditFileInput" onchange={handleAuditFileUpload} />
                            <lightning-button variant="neutral" label="Choose File" icon-name="utility:upload" onclick={handleAuditFileChoose}></lightning-button>
                            <span class="audit-file-name slds-m-left_small slds-text-color_weak">{auditFileName}</span>
                        </div>
                    </div>

                    <!-- Run button (org mode audits via its own Audit button) -->
                    <div class="slds-m-top_medium">
                        <lightning-button
                            variant="brand"
                            label="Run Logic Audit"
                            icon-name="utility:play"
                            disabled={auditRunDisabled}
                            onclick={handleRunLogicAudit}>
                        </lightning-button>
                    </div>
                </div>
            </template>

            <!-- Shared options + Reset (apply to both modes) -->
            <div class="slds-m-top_medium slds-grid slds-grid_vertical-align-center slds-wrap">
                <div class="slds-col slds-m-right_medium">
                    <lightning-input
                        type="checkbox"
                        label="Strip Managed Package Namespaces (Rule 8)"
                        checked={auditStripNamespaces}
                        onchange={handleAuditNamespaceToggle}>
                    </lightning-input>
                </div>
                <div class="slds-col">
                    <lightning-button
                        variant="neutral"
                        label="Reset"
                        icon-name="utility:refresh"
                        onclick={handleAuditReset}>
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <template lwc:if={hasAuditError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                <h2>{auditError}</h2>
            </div>
        </template>

        <!-- Results Panel -->
        <template lwc:if={hasAuditResult}>

            <!-- Flow Info + Hash Header -->
            <div class="slds-card slds-p-around_medium slds-m-bottom_medium audit-result-header">
                <div class="slds-grid slds-wrap slds-grid_vertical-align-center">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <h2 class="slds-text-heading_small slds-m-bottom_xx-small">
                            <lightning-icon icon-name="utility:check" size="xx-small" class="slds-m-right_xx-small" variant="success"></lightning-icon>
                            Analysis Complete
                        </h2>
                        <p class="slds-text-body_small slds-text-color_weak">{auditResult.processingLabel}</p>
                        <template lwc:if={auditResult.flowType}>
                            <p class="slds-text-body_small slds-m-top_xx-small">
                                <strong>Type:</strong> {auditResult.flowType}
                                <template lwc:if={auditResult.apiVersion}>
                                    &nbsp;•&nbsp; <strong>API:</strong> v{auditResult.apiVersion}
                                </template>
                            </p>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Element Summary Chips -->
            <template lwc:if={auditResult.hasChips}>
                <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
                    <h3 class="slds-text-title_bold slds-m-bottom_small">Element Breakdown</h3>
                    <div class="audit-chips-container">
                        <template for:each={auditResult.chips} for:item="chip">
                            <span key={chip.key} class="slds-badge audit-chip">
                                <lightning-icon icon-name={chip.icon} size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                {chip.label}
                            </span>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Clean Audit Banner -->
            <template lwc:if={auditIsClean}>
                <div class="slds-card slds-p-around_medium slds-m-bottom_medium audit-clean-banner">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <lightning-icon icon-name="utility:success" variant="success" size="small" class="slds-m-right_small"></lightning-icon>
                        <div>
                            <h3 class="slds-text-heading_small" style="color: #2e844a;">Clean Audit</h3>
                            <p class="slds-text-body_small slds-text-color_weak">No warnings or anti-patterns detected. This flow follows best practices.</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Critical Warnings -->
            <template lwc:if={hasAuditCriticalWarnings}>
                <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
                    <h3 class="slds-text-title_bold slds-text-color_error slds-m-bottom_small">
                        <lightning-icon icon-name="utility:ban" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                        Critical Warnings
                    </h3>
                    <template for:each={auditCriticalWarnings} for:item="warning">
                        <div key={warning.key} class="audit-warning-card audit-card-critical slds-m-bottom_small">
                            <div class="slds-grid slds-grid_vertical-align-start">
                                <lightning-icon icon-name={warning.severityIcon} size="x-small" class="slds-m-right_small audit-icon-critical"></lightning-icon>
                                <div>
                                    <p class="slds-text-body_regular"><strong>{warning.rule}</strong></p>
                                    <p class="slds-text-body_small slds-m-top_xx-small">{warning.message}</p>
                                    <template lwc:if={warning.element}>
                                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                            Element: <code>{warning.element}</code>
                                        </p>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Other Warnings -->
            <template lwc:if={hasAuditOtherWarnings}>
                <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
                    <h3 class="slds-text-title_bold slds-m-bottom_small">
                        <lightning-icon icon-name="utility:warning" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                        Additional Findings
                    </h3>
                    <template for:each={auditOtherWarnings} for:item="warning">
                        <div key={warning.key} class={warning.severityClass}>
                            <div class="audit-warning-card slds-m-bottom_small">
                                <div class="slds-grid slds-grid_vertical-align-start">
                                    <lightning-icon icon-name={warning.severityIcon} size="x-small" class="slds-m-right_small"></lightning-icon>
                                    <div>
                                        <p class="slds-text-body_regular"><strong>{warning.rule}</strong></p>
                                        <p class="slds-text-body_small slds-m-top_xx-small">{warning.message}</p>
                                        <template lwc:if={warning.element}>
                                            <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                                Element: <code>{warning.element}</code>
                                            </p>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Logic Trace Toggle -->
            <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
                <div class="audit-toggle-header" onclick={handleToggleAuditTrace}>
                    <lightning-icon icon-name={auditTraceIcon} size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                    <span class="slds-text-title_bold">{auditTraceToggleLabel}</span>
                    <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">— Semantic meaning of each execution step</span>
                </div>
                <template lwc:if={showAuditTrace}>
                    <div class="slds-m-top_small audit-trace-container">
                        <table class="audit-trace-table">
                            <thead>
                                <tr>
                                    <th style="width: 55px;">Step</th>
                                    <th style="width: 40%;">Meaning</th>
                                    <th>Impact</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={auditResult.trace} for:item="step">
                                    <tr key={step.key} class={step.categoryClass}>
                                        <td class="audit-trace-step-cell">
                                            {step.stepLabel}
                                        </td>
                                        <td class="audit-trace-meaning-cell">{step.meaning}</td>
                                        <td class="audit-trace-impact-cell">
                                            <template lwc:if={step.hasImpact}>
                                                <template for:each={step.impactSegments} for:item="seg">
                                                    <template lwc:if={seg.isBold}>
                                                        <strong key={seg.key} class="audit-impact-keyword">{seg.text}</strong>
                                                    </template>
                                                    <template lwc:else>
                                                        <span key={seg.key}>{seg.text}</span>
                                                    </template>
                                                </template>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>

            <!-- Sovereign Flowchart Toggle (Pure SVG — Zero Dependencies) -->
            <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
                <div class="audit-toggle-header" onclick={handleToggleAuditFlowchart}>
                    <lightning-icon icon-name={auditFlowchartIcon} size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                    <span class="slds-text-title_bold">{auditFlowchartToggleLabel}</span>
                    <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">— Sovereign Flowchart (native SVG, no external libraries)</span>
                </div>
                <template lwc:if={showAuditFlowchart}>
                    <!-- Zoom Controls + Actions -->
                    <div class="slds-m-top_small slds-m-bottom_small slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                        <div class="slds-grid slds-grid_vertical-align-center slds-wrap">
                            <label class="slds-text-body_small slds-text-color_weak slds-m-right_small">Zoom</label>
                            <input type="range" min="50" max="200" value="100" step="10"
                                   class="audit-zoom-slider" oninput={handleFlowchartZoom} />
                            <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">{flowchartZoomLabel}</span>
                        </div>
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-button
                                variant="neutral"
                                label="Download Flowchart"
                                icon-name="utility:download"
                                onclick={handleFlowchartDownloadHtml}>
                            </lightning-button>
                        </div>
                    </div>
                    <div class="audit-flowchart-wrapper">
                        <div class="audit-flowchart-scaler" style={flowchartScaleStyle}>
                            <div class="audit-flowchart-container" lwc:dom="manual"></div>
                        </div>
                    </div>
                </template>
            </div>

        </template>
    </template>
    </div>
</template>
